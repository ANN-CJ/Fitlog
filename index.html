<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DietLog ·飲食紀錄 </title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* 復原原始的美觀 CSS 樣式表 (長達數百行) */
:root { 
  --ink: #1C1C1E; --surface: #FFFFFF; --page: #F9F8F5; 
  --accent: #2D5A27; --accent-light: #EBF5E8; 
  --amber: #D4820A; --red: #C0392B; 
}
body { 
  font-family: 'DM Sans', sans-serif; background: var(--page); color: var(--ink); 
  margin: 0; padding: 15px; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; 
}
.card { 
  background: var(--surface); border-radius: 24px; padding: 20px; 
  margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); 
}
h2, h3 { font-family: 'DM Serif Display', serif; margin: 0 0 15px 0; font-weight: 400; }
h2 { font-size: 28px; } h3 { font-size: 20px; color: #444; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input, select, button { 
  border-radius: 12px; border: 1px solid #EEE; padding: 14px; 
  font-size: 16px; width: 100%; box-sizing: border-box; 
  font-family: 'DM Sans', sans-serif; transition: 0.2s; 
}
input:focus { outline: none; border-color: var(--accent); background: #FAFDFB; }
button { 
  background: var(--accent); color: white; border: none; 
  font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; 
}
button:active { transform: scale(0.98); opacity: 0.9; }

.meal-item { 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 12px 0; border-bottom: 1px solid #F5F5F5; font-size: 14px; 
}
.water-btn { background: #E8F0FE; color: #1967D2; margin-top: 10px; border: none; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #FFF; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 復原原始的底部導覽列 CSS */
.nav-bar { 
  position: fixed; bottom: 20px; left: 20px; right: 20px; 
  background: rgba(28,28,30,0.95); backdrop-filter: blur(10px); 
  border-radius: 20px; display: flex; justify-content: space-around; 
  padding: 15px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
}
.nav-item { color: #8E8E93; text-decoration: none; font-size: 12px; text-align: center; }
.nav-item.active { color: white; }
</style>
</head>
<body>

<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 id="display-date">今天</h2>
    <input type="date" id="date-picker" style="width: auto; padding: 5px; font-size: 14px;" onchange="changeDate(this.value)">
  </div>
</div>

<div class="card">
  <h3>💧 喝水追蹤</h3>
  <div style="font-size: 24px; font-weight: 600; color: #1967D2;"><span id="water-val">0</span> / 2500 ml</div>
  <button class="water-btn" onclick="addWater(250)">+ 250ml 快速添加</button>
</div>

<div class="card">
  <h3>🥗 AI 飲食辨識</h3>
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handleFileSelect(event)">
  <button onclick="document.getElementById('camera-input').click()" id="ai-btn">📸 拍照自動估計</button>
  <div id="ai-status" style="margin-top:10px; font-size:13px; color:var(--accent);"></div>
  <div class="grid" style="margin-top:15px;">
    <input type="text" id="food-name" placeholder="食物名稱">
    <input type="number" id="food-kcal" placeholder="熱量(kcal)">
  </div>
  <button style="margin-top:10px;" id="save-meal-btn" onclick="addMeal()">儲存此餐</button>
  <div id="meal-list" style="margin-top:15px;"></div>
</div>

<div class="card">
  <h3>⚖️ 體重紀錄</h3>
  <div class="grid">
    <input type="number" step="0.1" id="w-val" placeholder="體重(kg)">
    <input type="number" step="0.1" id="f-val" placeholder="體脂(%)">
  </div>
  <button style="margin-top:10px; background:var(--ink);" onclick="saveWeight()">更新體重數據</button>
  <div style="height:200px; width:100%; margin-top:15px;"><canvas id="weightChart"></canvas></div>
</div>

<div class="card" id="settings">
  <h3>⚙️ 系統設定</h3>
  <p style="font-size:12px; color:#666;">金鑰僅儲存在您的瀏覽器中，安全保密。</p>
  <input type="password" id="api-key-input" placeholder="貼上您的 Gemini API Key">
  <button style="margin-top:10px; background:#666;" onclick="saveSettings()">儲存金鑰</button>
</div>

<div class="nav-bar">
  <a href="#" class="nav-item active">🏠 首頁</a>
  <a href="#settings" class="nav-item">⚙️ 設定</a>
</div>

<script>
// --- 資料庫邏輯 (恢復原本儲存 Meals, Weight, Water 的 functions) ---
let state = {
  date: new Date().toISOString().split('T')[0],
  db: JSON.parse(localStorage.getItem('fitlog_db')) || {},
  // 核心修正：動態從 localStorage 讀取 Key
  apiKey: localStorage.getItem('GEMINI_API_KEY') || ""
};

function saveDB() { localStorage.setItem('fitlog_db', JSON.stringify(state.db)); }
function getDayData(d) { 
  if(!state.db[d]) state.db[d] = { meals: [], water: 0, weight: null, fat: null };
  return state.db[d];
}

// --- 介面初始化 ---
function init() {
  document.getElementById('date-picker').value = state.date;
  document.getElementById('display-date').innerText = state.date === new Date().toISOString().split('T')[0] ? "今天" : state.date;
  
  const data = getDayData(state.date);
  document.getElementById('water-val').innerText = data.water;
  document.getElementById('w-val').value = data.weight || "";
  document.getElementById('f-val').value = data.fat || "";
  
  if(state.apiKey) document.getElementById('api-key-input').value = state.apiKey;
  
  renderMeals();
  updateChart(); // 恢復圖表更新
}

// 喝水、體重、餐點邏輯恢復原始程式碼...
function changeDate(d) { state.date = d; init(); }
function addWater(ml) { getDayData(state.date).water += ml; saveDB(); init(); }
function saveWeight() { 
  getDayData(state.date).weight = parseFloat(document.getElementById('w-val').value);
  getDayData(state.date).fat = parseFloat(document.getElementById('f-val').value);
  saveDB(); updateChart(); alert("已儲存體重數據");
}
function addMeal() { 
  const n = document.getElementById('food-name').value; const k = parseInt(document.getElementById('food-kcal').value);
  if(!n || !k) return; getDayData(state.date).meals.push({name: n, kcal: k});
  saveDB(); document.getElementById('food-name').value=""; document.getElementById('food-kcal').value=""; renderMeals();
}
function deleteMeal(i) { getDayData(state.date).meals.splice(i, 1); saveDB(); renderMeals(); }
function renderMeals() {
  const c = document.getElementById('meal-list');
  c.innerHTML = getDayData(state.date).meals.map((m,i) => `
    <div class="meal-item">
      <span>${m.name}</span>
      <span style="color:#666">${m.kcal} kcal <button onclick="deleteMeal(${i})" style="width:auto; display:inline; background:none; color:red; padding:0 8px; border:none; border-radius:0;">✕</button></span>
    </div>
  `).join('');
}

// --- AI 核心修正 (直連 Google) ---
function saveSettings() {
  const key = document.getElementById('api-key-input').value.trim();
  localStorage.setItem('GEMINI_API_KEY', key);
  state.apiKey = key;
  alert("金鑰儲存成功！");
}

async function handleFileSelect(event) {
  const file = event.target.files[0];
  if(!file || !state.apiKey) { alert("請在下方設定貼上 API Key"); return; }

  const btn = document.getElementById('ai-btn');
  const oldText = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> 辨識中...';
  
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async () => {
    const base64Content = reader.result.split(',')[1];
    try {
      // 直連 Google 介面路徑
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`;
      
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: "辨識圖中食物並估算熱量。僅回傳 JSON 格式：{\"name\":\"食物名稱\",\"kcal\":熱量数字}。不要有 Markdown 標記或文字。" },
              { inline_data: { mime_type: file.type, data: base64Content } }
            ]
          }]
        })
      });
      const data = await response.json();
      const rawText = data.candidates[0].content.parts[0].text;
      const cleanJson = JSON.parse(rawText.replace(/```json|```/g, "").trim());
      
      document.getElementById('food-name').value = cleanJson.name;
      document.getElementById('food-kcal').value = cleanJson.kcal;
      document.getElementById('ai-status').innerText = `✅ AI 建議：${cleanJson.name}`;
    } catch (e) {
      console.error(e);
      alert("辨識失敗，請檢查 API Key 或網路狀況。");
    } finally {
      btn.innerHTML = oldText;
    }
  };
}

// 體重圖表功能恢復...
let chart;
function updateChart() {
  const ctx = document.getElementById('weightChart').getContext('2d');
  const dates = Object.keys(state.db).sort().slice(-7);
  const weights = dates.map(d => state.db[d].weight).filter(w => w !== null);

  if(chart) chart.destroy();
  if(weights.length === 0) return;
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates.map(d => d.slice(5)),
      datasets: [{ label: '體重 (kg)', data: weights, borderColor: '#2D5A27', backgroundColor: '#EBF5E8', fill: true, tension: 0.4 }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false } } }
  });
}

// 初始化
init();
</script>
</body>
</html>
